
server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:cunwu_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: cunwu_admin_jwt_secret_key_2024
  expiration: 604800000

knife4j:
  enable: true
  setting:
    language: zh_cn
